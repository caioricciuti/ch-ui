name: Dev image
on:
  push:
    branches: [fix/bigint-precision]

permissions:
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/dk-github/ch-ui:bigint-fix
          build-args: |
            VERSION=bigint-fix
            COMMIT=${{ github.sha }}
